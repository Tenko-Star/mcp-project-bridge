interface:
  display_name: "Project Bridge MCP"
  short_description: "Bridge project messages without cross-access"
  default_prompt: "Use $use-project-bridge-mcp to share and read project messages without operating inside other projects."

dependencies:
  tools:
    - type: "mcp"
      value: "mcp-project-bridge"
      description: "Local stdio MCP server for shared project messages"
      transport: "stdio"
