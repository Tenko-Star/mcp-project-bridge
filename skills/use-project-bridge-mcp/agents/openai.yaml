interface:
  display_name: "Project Bridge MCP"
  short_description: "Coordinate remote project messages"
  default_prompt: "Use $use-project-bridge-mcp to register this project's remote/device and exchange bridge messages without operating inside other projects."

dependencies:
  tools:
    - type: "mcp"
      value: "mcp-project-bridge"
      description: "Streamable HTTP MCP server for registered remote project messages"
      transport: "streamable_http"
      url: "http://127.0.0.1:3000/mcp"
